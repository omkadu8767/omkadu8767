<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0B1329" />
            <stop offset="50%" stop-color="#1A2448" />
            <stop offset="100%" stop-color="#101827" />
        </linearGradient>
        <linearGradient id="cardGradient" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#1E293B" stop-opacity="0.82" />
            <stop offset="100%" stop-color="#0B1220" stop-opacity="0.7" />
        </linearGradient>
        <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#38BDF8" />
            <stop offset="50%" stop-color="#7AA2F7" />
            <stop offset="100%" stop-color="#73DACA" />
        </linearGradient>
        <linearGradient id="metricCard" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0F172A" stop-opacity="0.9" />
            <stop offset="100%" stop-color="#1E293B" stop-opacity="0.74" />
        </linearGradient>
        <filter id="glassShadow" x="0" y="0" width="1280" height="760" filterUnits="userSpaceOnUse"
            color-interpolation-filters="sRGB">
            <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.5" />
        </filter>
    </defs>

    <rect width="1280" height="760" rx="32" fill="url(#bgGradient)" />
    <circle cx="1170" cy="84" r="220" fill="#7AA2F7" fill-opacity="0.16" />
    <circle cx="96" cy="740" r="240" fill="#38BDF8" fill-opacity="0.12" />
    <circle cx="640" cy="760" r="260" fill="#73DACA" fill-opacity="0.08" />

    <g filter="url(#glassShadow)">
        <rect x="36" y="34" width="1208" height="692" rx="28" fill="url(#cardGradient)"
            stroke="#334155" stroke-opacity="0.55" />
    </g>

    <text x="76" y="88" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="15"
        font-weight="600" letter-spacing="2">TOKYO NIGHT DASHBOARD</text>
    <text x="76" y="126" fill="#E5E7EB" font-family="Segoe UI, Arial, sans-serif" font-size="36"
        font-weight="700">GitHub Engineering Metrics</text>
    <text x="76" y="156" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">Live
        portfolio intelligence generated with GitHub GraphQL API</text>

    <g>
        <rect x="74" y="184" width="274" height="130" rx="20" fill="url(#metricCard)"
            stroke="#334155" />
        <text x="98" y="225" fill="#38BDF8" font-family="Segoe UI, Arial, sans-serif" font-size="16">
            Followers</text>
        <text x="98" y="275" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="46"
            font-weight="700">{{FOLLOWERS}}</text>
    </g>

    <g>
        <rect x="364" y="184" width="274" height="130" rx="20" fill="url(#metricCard)"
            stroke="#334155" />
        <text x="388" y="225" fill="#38BDF8" font-family="Segoe UI, Arial, sans-serif"
            font-size="16">Repositories</text>
        <text x="388" y="275" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif"
            font-size="46" font-weight="700">{{REPOSITORIES}}</text>
    </g>

    <g>
        <rect x="654" y="184" width="274" height="130" rx="20" fill="url(#metricCard)"
            stroke="#334155" />
        <text x="678" y="225" fill="#38BDF8" font-family="Segoe UI, Arial, sans-serif"
            font-size="16">Stars</text>
        <text x="678" y="275" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif"
            font-size="46" font-weight="700">{{STARS}}</text>
    </g>

    <g>
        <rect x="944" y="184" width="274" height="130" rx="20" fill="url(#metricCard)"
            stroke="#334155" />
        <text x="968" y="225" fill="#38BDF8" font-family="Segoe UI, Arial, sans-serif"
            font-size="16">Forks</text>
        <text x="968" y="275" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif"
            font-size="46" font-weight="700">{{FORKS}}</text>
    </g>

    <g>
        <rect x="74" y="342" width="562" height="346" rx="24" fill="#0B1220" fill-opacity="0.62"
            stroke="#334155" />
        <text x="98" y="382" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="25"
            font-weight="700">Contribution Snapshot</text>

        <text x="98" y="422" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Contributions
            (12 months)</text>
        <text x="610" y="422" text-anchor="end" fill="#E2E8F0"
            font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
            {{CONTRIBUTIONS}}</text>

        <text x="98" y="462" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Commit
            Contributions</text>
        <text x="610" y="462" text-anchor="end" fill="#E2E8F0"
            font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">{{COMMITS}}</text>

        <text x="98" y="502" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Pull
            Requests</text>
        <text x="610" y="502" text-anchor="end" fill="#E2E8F0"
            font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
            {{PULL_REQUESTS}}</text>

        <text x="98" y="542" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">
            Issues</text>
        <text x="610" y="542" text-anchor="end" fill="#E2E8F0"
            font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">{{ISSUES}}</text>

        <text x="98" y="582" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="16">Contributed
            Repositories</text>
        <text x="610" y="582" text-anchor="end" fill="#E2E8F0"
            font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
            {{REPOSITORIES_CONTRIBUTED_TO}}</text>

        <rect x="98" y="614" width="512" height="10" rx="5" fill="#1E293B" />
        <rect x="98" y="614" width="{{CONTRIBUTION_PROGRESS_WIDTH}}" height="10" rx="5"
            fill="url(#accent)" />
        <text x="98" y="650" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="14">Momentum
            score: contributions weighted by yearly activity.</text>
    </g>

    <g>
        <rect x="654" y="342" width="564" height="346" rx="24" fill="#0B1220" fill-opacity="0.62"
            stroke="#334155" />
    <text x="678" y="382" fill="#E2E8F0"
            font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Top Languages</text>
    <text
            x="678" y="410" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="15">Measured
        by repository language bytes</text> {{LANGUAGE_ROWS}} </g>

    <text x="76" y="712" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="14">Last
        Updated: {{LAST_UPDATED}} | Powered by custom GraphQL pipeline</text>
</svg>