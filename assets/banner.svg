            <stop offset="100%" stop-color="#1E293B" stop-opacity="0.76" />
        </linearGradient>
        <filter id="glow" x="0" y="0" width="1280" height="400" filterUnits="userSpaceOnUse"
            color-interpolation-filters="sRGB">
            <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#020617"
                flood-opacity="0.62" />
        </filter>
    </defs>

    <rect width="1280" height="400" rx="28" fill="url(#hero)" />
    <circle cx="1130" cy="40" r="180" fill="#7AA2F7" fill-opacity="0.2" />
